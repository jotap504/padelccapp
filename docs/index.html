<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PadelCC - Sistema de Gestión de Pádel</title>
    <meta http-equiv="refresh" content="0; url=https://padelccapp.vercel.app">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .features {
            text-align: left;
            margin: 2rem 0;
        }
        .feature {
            margin-bottom: 1rem;
            padding-left: 1.5rem;
            position: relative;
        }
        .feature:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #4ade80;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PadelCC</h1>
        <p>Sistema de Gestión de Pádel</p>
        
        <div class="features">
            <div class="feature">Sistema de Ranking ELO con 8 categorías</div>
            <div class="feature">Panel de Administración completo</div>
            <div class="feature">Gestión de Torneos y Partidos</div>
            <div class="feature">Sistema de Ascensos configurable</div>
            <div class="feature">Autenticación segura y múltiple</div>
        </div>
        
        <a href="https://padelccapp.vercel.app" class="btn">
            Ingresar al Sistema
        </a>
    </div>
</body>
</html>
